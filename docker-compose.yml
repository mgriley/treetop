services:
  traefik:
    image: traefik:v3
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - web
    restart: unless-stopped

  treetop:
    build: ./server
    environment:
      - NODE_ENV=production
      - HOST_DATA_ROOT=/treetop-data
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /treetop-data:/treetop-data
    networks:
      - web
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.treetop.rule=Host(`treetop.localhost`)"
      - "traefik.http.services.treetop.loadbalancer.server.port=3000"

networks:
  web:
    name: treetop_web
